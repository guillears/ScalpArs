<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCALPARS - Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1a1a2e',
                        secondary: '#16213e',
                        accent: '#0f3460',
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-strong {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
            20%, 40%, 60%, 80% { transform: translateX(4px); }
        }
        .robot {
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.3));
        }
        .fade-in {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
        .fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
        .fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }
        .shake { animation: shake 0.5s ease-in-out; }
        .glow-ring {
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            transition: box-shadow 0.3s ease;
        }
        .glow-ring:focus-within {
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3);
        }
        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
        }
        .grid-bg {
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="text-gray-100 font-sans grid-bg flex items-center justify-center px-4">

    <div class="w-full max-w-md">
        <!-- Login Card -->
        <div class="glass-strong rounded-2xl p-8 shadow-2xl">

            <!-- Robot + Branding -->
            <div class="text-center mb-8 fade-in fade-in-delay-1">
                <div class="robot text-8xl mb-4 inline-block select-none">🤖</div>
                <h1 class="text-4xl font-extrabold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent tracking-wider">
                    SCALPARS
                </h1>
                <p class="text-gray-400 text-sm mt-2 tracking-wide">Automated Trading Platform</p>
            </div>

            <!-- Error Message -->
            <div id="error-box" class="hidden mb-4 px-4 py-3 rounded-lg bg-red-500/15 border border-red-500/30 text-red-400 text-sm text-center fade-in">
                <span id="error-msg">Wrong password</span>
            </div>

            <!-- Login Form -->
            <form id="login-form" method="POST" action="/login" class="space-y-5 fade-in fade-in-delay-2">

                <div class="glow-ring rounded-lg">
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </span>
                        <input
                            type="password"
                            name="password"
                            id="password"
                            placeholder="Enter password"
                            autocomplete="current-password"
                            required
                            class="w-full pl-11 pr-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500/50 transition-colors"
                        >
                    </div>
                </div>

                <button
                    type="submit"
                    id="login-btn"
                    class="btn-glow w-full py-3 rounded-lg font-semibold text-white bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 transition-all duration-300 flex items-center justify-center space-x-2"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                    </svg>
                    <span>Login</span>
                </button>
            </form>

            <!-- Footer -->
            <p class="text-center text-gray-600 text-xs mt-8 fade-in fade-in-delay-3">
                SCALPARS Trading Platform v1.0
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const errorBox = document.getElementById('error-box');
        const errorMsg = document.getElementById('error-msg');
        const card = form.closest('.glass-strong');
        const passwordInput = document.getElementById('password');

        // Show error from query param
        const params = new URLSearchParams(window.location.search);
        if (params.get('error') === '1') {
            errorBox.classList.remove('hidden');
            card.classList.add('shake');
            passwordInput.focus();
            setTimeout(() => card.classList.remove('shake'), 500);
        } else {
            passwordInput.focus();
        }
    </script>
</body>
</html>
